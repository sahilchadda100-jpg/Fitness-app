<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitAI - Personal Fitness Coach</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:#0a0a0a;
  font-family:'Trebuchet MS',sans-serif;
  color:#fff;
  padding-bottom:60px;
}
.header {
  background:#0a0a0a;
  border-bottom:1px solid #1a1a1a;
  padding:18px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
}
.logo-box {
  width:36px; height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,#a3e635,#4ade80);
  display:flex; align-items:center;
  justify-content:center;
  font-size:18px; margin-right:10px;
}
.logo-row { display:flex; align-items:center; }
.logo-title { font-weight:900; font-size:18px; letter-spacing:-0.5px; }
.logo-sub { font-size:10px; color:#666; letter-spacing:2px; text-transform:uppercase; }
.restart-btn {
  background:#1a1a1a; border:1px solid #333;
  color:#999; padding:8px 14px;
  border-radius:8px; cursor:pointer; font-size:12px;
}
.container { max-width:480px; margin:0 auto; padding:24px 16px; }
.step-label { font-size:11px; color:#a3e635; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; }
.step-title { font-size:26px; font-weight:900; line-height:1.1; margin-bottom:24px; }
.step-title span { color:#a3e635; }
.field-label { display:block; font-size:11px; color:#666; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.toggle-row { display:flex; gap:10px; margin-bottom:18px; }
.toggle-btn {
  flex:1; padding:12px; border-radius:10px;
  border:1px solid #222; background:#111;
  color:#666; cursor:pointer; font-size:13px; font-weight:600;
  transition:all 0.2s;
}
.toggle-btn.active { border-color:#a3e635; background:rgba(163,230,53,0.1); color:#a3e635; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }
.input-wrap { position:relative; }
.num-input {
  width:100%; padding:14px 60px 14px 14px;
  background:#111; border:1px solid #222;
  border-radius:10px; color:#fff;
  font-size:20px; font-weight:700; outline:none;
}
.num-input:focus { border-color:#a3e635; }
.input-unit { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#444; font-size:12px; }
.full-col { grid-column:1 / -1; }
.tag-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
.tag-btn {
  padding:8px 16px; border-radius:8px;
  border:1px solid #222; background:#111;
  color:#555; cursor:pointer; font-size:12px; font-weight:600;
  transition:all 0.2s;
}
.tag-btn.active { border-color:#a3e635; background:rgba(163,230,53,0.1); color:#a3e635; }
.main-btn {
  width:100%; padding:16px; border:none;
  border-radius:12px; font-size:15px;
  font-weight:900; cursor:pointer;
  text-transform:uppercase; letter-spacing:1px;
  transition:all 0.2s;
}
.main-btn.enabled { background:linear-gradient(135deg,#a3e635,#4ade80); color:#000; }
.main-btn.disabled { background:#1a1a1a; color:#333; cursor:not-allowed; }
.goals-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px; }
.goal-btn {
  padding:18px 14px; border-radius:14px;
  border:2px solid #1a1a1a; background:#111;
  cursor:pointer; text-align:left; transition:all 0.2s;
}
.goal-btn.active { border-color:#a3e635; background:rgba(163,230,53,0.08); }
.goal-icon { font-size:26px; margin-bottom:8px; }
.goal-label { font-weight:800; font-size:14px; margin-bottom:3px; color:#fff; }
.goal-btn.active .goal-label { color:#a3e635; }
.goal-desc { color:#555; font-size:12px; }
.btn-row { display:flex; gap:10px; }
.back-btn {
  padding:16px 20px; background:#111;
  border:1px solid #222; border-radius:12px;
  color:#666; cursor:pointer; font-size:14px;
}
.spinner-wrap { text-align:center; margin-top:24px; }
.spinner {
  width:40px; height:40px;
  border:3px solid #1a1a1a;
  border-top:3px solid #a3e635;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.spin-text { color:#555; font-size:13px; }
.stats-bar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:22px; }
.stat-card {
  background:#111; border-radius:12px;
  padding:14px 8px; text-align:center;
  border:1px solid #1a1a1a;
}
.stat-val { font-size:18px; font-weight:900; margin-bottom:2px; }
.stat-key { font-size:9px; color:#444; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.stat-sub { font-size:10px; color:#666; }
.summary-box {
  background:rgba(163,230,53,0.06);
  border:1px solid rgba(163,230,53,0.2);
  border-radius:14px; padding:16px; margin-bottom:20px;
}
.summary-label { font-size:11px; color:#a3e635; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
.summary-text { color:#ccc; line-height:1.6; font-size:14px; }
.tabs { display:flex; gap:6px; margin-bottom:18px; background:#111; padding:6px; border-radius:12px; }
.tab-btn {
  flex:1; padding:10px 6px; border-radius:8px;
  border:none; background:transparent;
  color:#555; cursor:pointer; font-size:12px; font-weight:700;
  transition:all 0.2s;
}
.tab-btn.active { background:linear-gradient(135deg,#a3e635,#4ade80); color:#000; }
.day-card {
  background:#111; border-radius:14px;
  padding:16px; margin-bottom:12px;
  border:1px solid #1a1a1a;
}
.day-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.day-name { font-weight:800; font-size:15px; }
.day-focus {
  background:rgba(163,230,53,0.1); color:#a3e635;
  padding:4px 12px; border-radius:20px;
  font-size:11px; font-weight:700;
}
.ex-row {
  display:flex; justify-content:space-between;
  align-items:flex-start; padding:10px 0;
  border-bottom:1px solid #1a1a1a;
}
.ex-row:last-child { border-bottom:none; }
.ex-name { font-weight:700; font-size:14px; margin-bottom:2px; }
.ex-tip { color:#555; font-size:12px; }
.ex-sets { color:#f97316; font-weight:800; font-size:13px; white-space:nowrap; margin-left:12px; }
.meal-card {
  background:#111; border-radius:14px;
  padding:16px; margin-bottom:12px;
  border:1px solid #1a1a1a;
  display:flex; justify-content:space-between; align-items:center;
}
.meal-time { font-size:11px; color:#a3e635; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.meal-name { font-weight:700; font-size:15px; margin-bottom:4px; }
.meal-macros { color:#555; font-size:12px; }
.meal-emoji { font-size:28px; }
.tips-box {
  background:rgba(249,115,22,0.08);
  border:1px solid rgba(249,115,22,0.2);
  border-radius:12px; padding:14px; margin-top:4px;
}
.tips-label { font-size:11px; color:#f97316; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.tip-item { color:#888; font-size:13px; margin-bottom:6px; }
.chat-box {
  background:#111; border-radius:14px;
  padding:16px; min-height:280px; max-height:360px;
  overflow-y:auto; margin-bottom:12px;
  border:1px solid #1a1a1a;
}
.chat-empty { text-align:center; padding-top:40px; }
.chat-empty-icon { font-size:40px; margin-bottom:12px; }
.chat-empty-text { color:#444; font-size:14px; }
.quick-questions { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; justify-content:center; }
.quick-q {
  background:#1a1a1a; border:1px solid #222;
  color:#666; padding:8px 12px;
  border-radius:20px; cursor:pointer; font-size:12px;
}
.msg-row { display:flex; margin-bottom:12px; }
.msg-row.user { justify-content:flex-end; }
.msg-row.ai { justify-content:flex-start; }
.msg-bubble {
  max-width:82%; padding:10px 14px;
  border-radius:14px; font-size:13px; line-height:1.5;
}
.msg-bubble.user { background:linear-gradient(135deg,#a3e635,#4ade80); color:#000; }
.msg-bubble.ai { background:#1a1a1a; color:#ccc; }
.typing { display:flex; gap:4px; padding:10px 14px; background:#1a1a1a; border-radius:14px; width:fit-content; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:#a3e635;
}
.dot1 { animation:bounce 0.8s ease-in-out 0s infinite; }
.dot2 { animation:bounce 0.8s ease-in-out 0.15s infinite; }
.dot3 { animation:bounce 0.8s ease-in-out 0.3s infinite; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.chat-input-row { display:flex; gap:10px; }
.chat-input {
  flex:1; padding:14px 16px;
  background:#111; border:1px solid #222;
  border-radius:12px; color:#fff;
  font-size:14px; outline:none;
}
.chat-input:focus { border-color:#a3e635; }
.send-btn {
  padding:14px 18px; border-radius:12px;
  border:none; cursor:pointer; font-size:18px;
  transition:all 0.2s;
}
.send-btn.enabled { background:linear-gradient(135deg,#a3e635,#4ade80); color:#000; }
.send-btn.disabled { background:#1a1a1a; color:#333; cursor:not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-box">⚡</div>
    <div>
      <div class="logo-title">FitAI</div>
      <div class="logo-sub">Personal Coach</div>
    </div>
  </div>
  <button class="restart-btn" id="restartBtn" style="display:none" onclick="restart()">↩ Restart</button>
</div>

<div class="container" id="app">

  <!-- STEP 0: Stats -->
  <div id="step0">
    <div class="step-label">Step 1 of 2</div>
    <h1 class="step-title">Tell us about<br><span>yourself</span></h1>

    <label class="field-label">Gender</label>
    <div class="toggle-row" id="genderRow">
      <button class="toggle-btn active" onclick="selectGender(this,'Male')">Male</button>
      <button class="toggle-btn" onclick="selectGender(this,'Female')">Female</button>
      <button class="toggle-btn" onclick="selectGender(this,'Other')">Other</button>
    </div>

    <div class="stats-grid">
      <div>
        <label class="field-label">Age</label>
        <div class="input-wrap">
          <input class="num-input" type="number" id="age" placeholder="25">
          <span class="input-unit">years</span>
        </div>
      </div>
      <div>
        <label class="field-label">Weight</label>
        <div class="input-wrap">
          <input class="num-input" type="number" id="weight" placeholder="160">
          <span class="input-unit">lbs</span>
        </div>
      </div>
      <div class="full-col">
        <label class="field-label">Height</label>
        <div class="input-wrap">
          <input class="num-input" type="number" id="height" placeholder="68">
          <span class="input-unit">inches</span>
        </div>
      </div>
    </div>

    <label class="field-label">Dietary Preference</label>
    <div class="tag-row" id="dietRow">
      <button class="tag-btn active" onclick="selectDiet(this,'No Preference')">No Preference</button>
      <button class="tag-btn" onclick="selectDiet(this,'Vegetarian')">Vegetarian</button>
      <button class="tag-btn" onclick="selectDiet(this,'Vegan')">Vegan</button>
      <button class="tag-btn" onclick="selectDiet(this,'Keto')">Keto</button>
      <button class="tag-btn" onclick="selectDiet(this,'High Protein')">High Protein</button>
    </div>

    <button class="main-btn disabled" id="step0Btn" onclick="goToStep1()">Continue →</button>
  </div>

  <!-- STEP 1: Goal -->
  <div id="step1" style="display:none">
    <div class="step-label">Step 2 of 2</div>
    <h1 class="step-title">What's your<br><span>goal?</span></h1>

    <div class="goals-grid" id="goalsGrid">
      <button class="goal-btn" onclick="selectGoal(this,'lose_fat','Lose Fat')">
        <div class="goal-icon">🔥</div>
        <div class="goal-label">Lose Fat</div>
        <div class="goal-desc">Burn calories & slim down</div>
      </button>
      <button class="goal-btn" onclick="selectGoal(this,'build_muscle','Build Muscle')">
        <div class="goal-icon">💪</div>
        <div class="goal-label">Build Muscle</div>
        <div class="goal-desc">Gain strength & size</div>
      </button>
      <button class="goal-btn" onclick="selectGoal(this,'stay_fit','Stay Fit')">
        <div class="goal-icon">⚡</div>
        <div class="goal-label">Stay Fit</div>
        <div class="goal-desc">Maintain & feel great</div>
      </button>
      <button class="goal-btn" onclick="selectGoal(this,'run_more','Run More')">
        <div class="goal-icon">🏃</div>
        <div class="goal-label">Run More</div>
        <div class="goal-desc">Endurance & cardio</div>
      </button>
    </div>

    <label class="field-label">Fitness Level</label>
    <div class="toggle-row" id="levelRow" style="margin-bottom:24px">
      <button class="toggle-btn active" onclick="selectLevel(this,'Beginner')">Beginner</button>
      <button class="toggle-btn" onclick="selectLevel(this,'Intermediate')">Intermediate</button>
      <button class="toggle-btn" onclick="selectLevel(this,'Advanced')">Advanced</button>
    </div>

    <div class="btn-row">
      <button class="back-btn" onclick="goToStep0()">← Back</button>
      <button class="main-btn disabled" id="step1Btn" onclick="generatePlan()" style="flex:1">🚀 Generate My Plan</button>
    </div>

    <div id="loadingDiv" style="display:none" class="spinner-wrap">
      <div class="spinner"></div>
      <p class="spin-text">AI is crafting your personalized plan...</p>
    </div>
  </div>

  <!-- STEP 2: Plan -->
  <div id="step2" style="display:none">
    <div class="stats-bar" id="statsBar"></div>
    <div class="summary-box">
      <div class="summary-label">⚡ Your Assessment</div>
      <div class="summary-text" id="summaryText"></div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'workout')">💪 Workout</button>
      <button class="tab-btn" onclick="switchTab(this,'meals')">🥗 Meals</button>
      <button class="tab-btn" onclick="switchTab(this,'chat')">🤖 Ask AI</button>
    </div>
    <div id="workoutTab"></div>
    <div id="mealsTab" style="display:none"></div>
    <div id="chatTab" style="display:none">
      <div class="chat-box" id="chatBox">
        <div class="chat-empty">
          <div class="chat-empty-icon">🤖</div>
          <div class="chat-empty-text">Ask me anything about your fitness!</div>
          <div class="quick-questions">
            <button class="quick-q" onclick="setQ('Best time to workout?')">Best time to workout?</button>
            <button class="quick-q" onclick="setQ('How much water daily?')">How much water daily?</button>
            <button class="quick-q" onclick="setQ('Can I eat carbs?')">Can I eat carbs?</button>
          </div>
        </div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Ask your AI coach..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn disabled" id="sendBtn" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = "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"
let state = { gender:"Male", diet:"No Preference", level:"Beginner", goal:"", goalLabel:"", plan:null, chat:[] };

// Input listeners
["age","weight","height"].forEach(id => {
  document.getElementById(id).addEventListener("input", checkStep0);
});
document.getElementById("chatInput").addEventListener("input", function() {
  const btn = document.getElementById("sendBtn");
  btn.className = "send-btn " + (this.value.trim() ? "enabled" : "disabled");
});

function checkStep0() {
  const ok = document.getElementById("age").value && document.getElementById("weight").value && document.getElementById("height").value;
  document.getElementById("step0Btn").className = "main-btn " + (ok ? "enabled" : "disabled");
}

function selectGender(el, val) {
  document.querySelectorAll("#genderRow .toggle-btn").forEach(b => b.className = "toggle-btn");
  el.className = "toggle-btn active"; state.gender = val;
}
function selectDiet(el, val) {
  document.querySelectorAll("#dietRow .tag-btn").forEach(b => b.className = "tag-btn");
  el.className = "tag-btn active"; state.diet = val;
}
function selectLevel(el, val) {
  document.querySelectorAll("#levelRow .toggle-btn").forEach(b => b.className = "toggle-btn");
  el.className = "toggle-btn active"; state.level = val;
}
function selectGoal(el, id, label) {
  document.querySelectorAll("#goalsGrid .goal-btn").forEach(b => b.className = "goal-btn");
  el.className = "goal-btn active"; state.goal = id; state.goalLabel = label;
  document.getElementById("step1Btn").className = "main-btn enabled";
}
function goToStep1() {
  if (!document.getElementById("age").value) return;
  document.getElementById("step0").style.display = "none";
  document.getElementById("step1").style.display = "block";
}
function goToStep0() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step0").style.display = "block";
}
function switchTab(el, tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.className = "tab-btn");
  el.className = "tab-btn active";
  ["workout","meals","chat"].forEach(t => {
    document.getElementById(t+"Tab").style.display = t===tab ? "block" : "none";
  });
}

async function generatePlan() {
  if (!state.goal) return;
  document.getElementById("loadingDiv").style.display = "block";
  document.getElementById("step1Btn").className = "main-btn disabled";
  const age = document.getElementById("age").value;
  const weight = document.getElementById("weight").value;
  const height = document.getElementById("height").value;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:1000,
        messages:[{role:"user",content:`You are an expert fitness coach. Create a personalized fitness plan.
User: ${age}yo ${state.gender}, ${weight}lbs, ${height}in tall, goal: ${state.goalLabel}, level: ${state.level}, diet: ${state.diet}.
Respond ONLY in this exact JSON (no markdown):
{"bmi":"number","bmi_category":"Normal/Overweight/Underweight/Obese","daily_calories":"number","summary":"2 sentence motivational summary","workout":[{"day":"Monday","focus":"area","exercises":[{"name":"ex","sets":"3x10","tip":"tip"}]},{"day":"Wednesday","focus":"area","exercises":[{"name":"ex","sets":"3x12","tip":"tip"}]},{"day":"Friday","focus":"area","exercises":[{"name":"ex","sets":"3x10","tip":"tip"}]},{"day":"Sunday","focus":"Recovery","exercises":[{"name":"ex","sets":"20min","tip":"tip"}]}],"meals":[{"time":"Breakfast 7AM","meal":"name","calories":"num","protein":"num"},{"time":"Lunch 12PM","meal":"name","calories":"num","protein":"num"},{"time":"Snack 3PM","meal":"name","calories":"num","protein":"num"},{"time":"Dinner 7PM","meal":"name","calories":"num","protein":"num"}],"tips":["tip1","tip2","tip3"]}`}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||"").join("");
    state.plan = JSON.parse(text.replace(/```json|```/g,"").trim());
    renderPlan();
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
    document.getElementById("restartBtn").style.display = "block";
  } catch(e) { alert("Error! Check your API key in the code."); }
  document.getElementById("loadingDiv").style.display = "none";
  document.getElementById("step1Btn").className = "main-btn enabled";
}

function renderPlan() {
  const p = state.plan;
  const bmiColor = parseFloat(p.bmi)<18.5?"#60a5fa":parseFloat(p.bmi)<25?"#4ade80":parseFloat(p.bmi)<30?"#fbbf24":"#f87171";
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:${bmiColor}">${p.bmi}</div><div class="stat-key">BMI</div><div class="stat-sub">${p.bmi_category}</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#f97316">${p.daily_calories}</div><div class="stat-key">Daily Cal</div><div class="stat-sub">calories</div></div>
    <div
